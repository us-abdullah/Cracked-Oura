# Render Blueprint — https://render.com
# Set BIOTRACKER_CLOUD_TOKEN in the dashboard after first deploy.

services:
  - type: web
    name: usman-biotracker-cloud
    runtime: docker
    dockerfilePath: ./cloud/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /api/cloud/status
    envVars:
      - key: BIOTRACKER_CLOUD
        value: "1"
      - key: BIOTRACKER_DATA_DIR
        value: /data
      - key: BIOTRACKER_CLOUD_TOKEN
        generateValue: true
      - key: PORT
        value: "8000"
    disk:
      name: biotracker-data
      mountPath: /data
      sizeGB: 1
